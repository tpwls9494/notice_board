    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          var nextTheme = theme === 'dark' ? 'dark' : 'light';
          var root = document.documentElement;

          if (nextTheme === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }

          root.style.colorScheme = nextTheme;

          var colorSchemeMeta = document.querySelector('meta[name=\"color-scheme\"]');
          if (colorSchemeMeta) {
            colorSchemeMeta.setAttribute('content', nextTheme === 'dark' ? 'dark light' : 'light dark');
          }

          var themeColorMeta = document.querySelector('meta[name=\"theme-color\"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', nextTheme === 'dark' ? '#0b0b0f' : '#fafafa');
          }
        } catch (_error) {
          // Ignore failures and keep default light mode.
        }
      })();
    </script>
    <title>jion community</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
