version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: company_board_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: company_board
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: company_board_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: company_board_backend
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/company_board
      - REDIS_URL=redis://redis:6379/0
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com/v1}
      - AI_ROUTE_MODEL=${AI_ROUTE_MODEL:-gpt-4.1-mini}
      - AI_CHAT_MODEL=${AI_CHAT_MODEL:-gpt-4.1-mini}
      - AI_EDITOR_MODEL=${AI_EDITOR_MODEL:-gpt-4.1-mini}
      - AI_EDITOR_FALLBACK_MODEL=${AI_EDITOR_FALLBACK_MODEL:-gpt-4.1-mini}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-12}
      - AI_EDITOR_TIMEOUT_SECONDS=${AI_EDITOR_TIMEOUT_SECONDS:-45}
      - AI_ROUTE_MAX_TOKENS=${AI_ROUTE_MAX_TOKENS:-120}
      - AI_CHAT_MAX_TOKENS=${AI_CHAT_MAX_TOKENS:-600}
      - AI_EDITOR_MAX_TOKENS=${AI_EDITOR_MAX_TOKENS:-900}
      - AI_RATE_LIMIT_WINDOW_SECONDS=${AI_RATE_LIMIT_WINDOW_SECONDS:-60}
      - AI_RATE_LIMIT_MAX_REQUESTS=${AI_RATE_LIMIT_MAX_REQUESTS:-20}
      - AI_CACHE_TTL_SECONDS=${AI_CACHE_TTL_SECONDS:-180}
      - AI_CACHE_MAX_ITEMS=${AI_CACHE_MAX_ITEMS:-500}
      - AI_INPUT_COST_PER_1K_USD=${AI_INPUT_COST_PER_1K_USD:-0}
      - AI_OUTPUT_COST_PER_1K_USD=${AI_OUTPUT_COST_PER_1K_USD:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: company_board_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host

  nginx:
    image: nginx:alpine
    container_name: company_board_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
