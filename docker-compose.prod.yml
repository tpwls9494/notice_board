services:
  postgres:
    image: postgres:15-alpine
    container_name: company_board_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: company_board_redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: company_board_backend
    volumes:
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL}
      - BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - API_DOCS_ENABLED=${API_DOCS_ENABLED}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - OAUTH_FRONTEND_DEFAULT_REDIRECT=${OAUTH_FRONTEND_DEFAULT_REDIRECT}
      - EMAIL_VERIFICATION_FRONTEND_BASE_URL=${EMAIL_VERIFICATION_FRONTEND_BASE_URL}
      - EMAIL_VERIFICATION_TOKEN_TTL_HOURS=${EMAIL_VERIFICATION_TOKEN_TTL_HOURS}
      - EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS=${EMAIL_VERIFICATION_RESEND_WINDOW_SECONDS}
      - EMAIL_VERIFICATION_RESEND_MAX_ATTEMPTS=${EMAIL_VERIFICATION_RESEND_MAX_ATTEMPTS}
      - SIGNUP_EMAIL_CODE_TTL_MINUTES=${SIGNUP_EMAIL_CODE_TTL_MINUTES}
      - SIGNUP_EMAIL_CODE_LENGTH=${SIGNUP_EMAIL_CODE_LENGTH}
      - SIGNUP_EMAIL_SEND_WINDOW_SECONDS=${SIGNUP_EMAIL_SEND_WINDOW_SECONDS}
      - SIGNUP_EMAIL_SEND_MAX_ATTEMPTS=${SIGNUP_EMAIL_SEND_MAX_ATTEMPTS}
      - SIGNUP_EMAIL_CONFIRM_WINDOW_SECONDS=${SIGNUP_EMAIL_CONFIRM_WINDOW_SECONDS}
      - SIGNUP_EMAIL_CONFIRM_MAX_ATTEMPTS=${SIGNUP_EMAIL_CONFIRM_MAX_ATTEMPTS}
      - SIGNUP_EMAIL_VERIFICATION_TICKET_TTL_MINUTES=${SIGNUP_EMAIL_VERIFICATION_TICKET_TTL_MINUTES}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - SMTP_USE_TLS=${SMTP_USE_TLS}
      - SMTP_USE_SSL=${SMTP_USE_SSL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_ROUTE_MODEL=${AI_ROUTE_MODEL}
      - AI_CHAT_MODEL=${AI_CHAT_MODEL}
      - AI_EDITOR_MODEL=${AI_EDITOR_MODEL}
      - AI_EDITOR_FALLBACK_MODEL=${AI_EDITOR_FALLBACK_MODEL:-gpt-4.1-mini}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-12}
      - AI_EDITOR_TIMEOUT_SECONDS=${AI_EDITOR_TIMEOUT_SECONDS:-45}
      - AI_ROUTE_MAX_TOKENS=${AI_ROUTE_MAX_TOKENS}
      - AI_CHAT_MAX_TOKENS=${AI_CHAT_MAX_TOKENS}
      - AI_EDITOR_MAX_TOKENS=${AI_EDITOR_MAX_TOKENS}
      - AI_RATE_LIMIT_WINDOW_SECONDS=${AI_RATE_LIMIT_WINDOW_SECONDS}
      - AI_RATE_LIMIT_MAX_REQUESTS=${AI_RATE_LIMIT_MAX_REQUESTS}
      - AI_CACHE_TTL_SECONDS=${AI_CACHE_TTL_SECONDS}
      - AI_CACHE_MAX_ITEMS=${AI_CACHE_MAX_ITEMS}
      - AI_INPUT_COST_PER_1K_USD=${AI_INPUT_COST_PER_1K_USD}
      - AI_OUTPUT_COST_PER_1K_USD=${AI_OUTPUT_COST_PER_1K_USD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: company_board_nginx
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
